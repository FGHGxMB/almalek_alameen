name: spice_app
description: تطبيق إدارة مندوبي توزيع البهارات
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

  # State Management & Navigation
  flutter_bloc: ^8.1.3
  go_router: ^12.1.1

  # Local Storage & Caching
  shared_preferences: ^2.2.2
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Utilities
  intl: 0.20.2
  excel: ^3.0.0
  share_plus: ^7.2.1
  uuid: ^4.2.2

  # UI Helpers
  google_fonts: ^6.1.0

  esc_pos_utils: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  drift_dev: ^2.14.1

flutter:
  uses-material-design: true